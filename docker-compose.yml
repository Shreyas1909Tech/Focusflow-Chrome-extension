version: '3.8'

services:
  # MongoDB Service
  mongodb:
    image: mongo:7.0-alpine
    container_name: focusflow-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-focusflow}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-focusflow_dev}
      MONGO_INITDB_DATABASE: focusflow
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - focusflow-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # FocusFlow API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: focusflow-api
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_USERNAME:-focusflow}:${MONGO_PASSWORD:-focusflow_dev}@mongodb:27017/focusflow?authSource=admin
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - focusflow-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (res) => { if (res.statusCode !== 200) throw new Error(res.statusCode) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  focusflow-network:
    driver: bridge
